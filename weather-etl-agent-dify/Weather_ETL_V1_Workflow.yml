            6. Remove duplicates

            7. Return ONLY a valid JSON array, nothing else

            Example input: "delhi, Bombay, kolkata, Chennai, Blr"

            Example output: ["Delhi", "Mumbai", "Kolkata", "Chennai", "Bangalore"]'
